name: E2E Tests + Dashboard

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  e2e:
    name: Run E2E + Publish Dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx -q

      - name: Run E2E suite
        env:
          SYNTHFIN_TEST_KEY:     ${{ secrets.SYNTHFIN_TEST_KEY }}
          SYNTHFIN_ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SYNTHFIN_API_URL:      https://api.synthfin.com.br
          SYNTHFIN_WEB_URL:      https://app.synthfin.com.br
          SYNTHFIN_LAND_URL:     https://synthfin.com.br
        run: |
          mkdir -p results
          python3 run_e2e.py || true   # never fail the workflow — always publish dashboard

      - name: Generate dashboard
        run: |
          if [ -f results/latest.json ]; then
            python3 generate_dashboard.py results/latest.json results/index.html
            echo "Dashboard generated"
          else
            echo '{"run_id":"no-data","started_at":"","summary":{"total":0,"passed":0,"failed":0,"skipped":0,"pass_rate":0,"avg_duration_ms":0},"results":[]}' > results/latest.json
            python3 generate_dashboard.py results/latest.json results/index.html || \
              echo "<html><body><h1>No data yet</h1></body></html>" > results/index.html
          fi

      - name: Write badge
        run: |
          python3 - <<'PYEOF'
          import json
          from pathlib import Path
          try:
              d = json.loads(Path("results/latest.json").read_text())
              rate = d["summary"]["pass_rate"]
              color = "brightgreen" if rate >= 95 else "yellow" if rate >= 80 else "red"
          except Exception:
              rate, color = 0, "lightgrey"
          badge = {"schemaVersion": 1, "label": "e2e", "message": f"{rate}% pass", "color": color}
          Path("results/badge.json").write_text(json.dumps(badge))
          PYEOF

      - name: Copy history
        run: |
          mkdir -p results/history
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp results/latest.json results/history/${TIMESTAMP}.json 2>/dev/null || true
          ls -t results/history/*.json 2>/dev/null | tail -n +51 | xargs rm -f 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          PASS=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(d['summary']['pass_rate'])" 2>/dev/null || echo "?")
          FAILED=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(d['summary']['failed'])" 2>/dev/null || echo "?")
          echo "## E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "| Pass Rate | Failed |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **${PASS}%** | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Dashboard](https://afborda.github.io/synthfin-status/)" >> $GITHUB_STEP_SUMMARY
